version: "3.8"

services:
  backend:
    build:
    container_name: toolnet-be-dev
    ports:
    - "8000:8000"
    env_file:
    - .env
    volumes:
      - ./Grape.db:/app/Grape.db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: toolnet-redis
    ports:
      - "6379:6379"
    resstart: unless-stopped